<!DOCTYPE html>
<html>
<head>
    <title>Easy Access Control</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 40px;
            margin: 0;
            background: #f7f7f7;
        }

        .container {
            max-width: 950px;
            margin: auto;
        }

        h1 {
            margin-bottom: 10px;
        }

        p.top-text {
            color: #555;
            margin-bottom: 25px;
        }

        .btn {
            display: inline-block;
            padding: 12px 24px;
            background: purple;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            margin-bottom: 35px;
        }

        .section {
            background: white;
            margin: 25px 0;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        img {
            width: 100%;
            max-width: 650px;
            border-radius: 10px;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Easy Access Control</h1>
        <p class="top-text">Control Create, Edit, Delete access easily.</p>

        <a class="btn" href="/form">Request Demo</a>

        <div class="section">
            <h3>Access Control Setup</h3>
            <img src="/images/screen1.png" alt="Access Control Setup">
        </div>

        <div class="section">
            <h3>Read Only Access</h3>
            <img src="/images/screen2.png" alt="Read Only Access">
        </div>

        <div class="section">
            <h3>Edit Restriction</h3>
            <img src="/images/screen3.png" alt="Edit Restriction">
        </div>

        <div class="section">
            <h3>Delete Restriction</h3>
            <img src="/images/screen4.png" alt="Delete Restriction">
        </div>

        <div class="section">
            <h3>Create Restriction</h3>
            <img src="/images/screen5.png" alt="Create Restriction">
        </div>
    </div>
</body>
</html>
